[package]
name = "serverust-events"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Suporte event-driven opt-in para serverust: extractors tipados para Kafka, SQS, EventBridge."

[features]
default = []
# GeraĂ§Ă£o de spec AsyncAPI 3.0. Puxa schemars + serde_yaml (leves, sem C deps).
asyncapi = ["dep:schemars", "dep:serde_yaml"]
# Habilita InMemoryBroker para testes sem broker fĂ­sico.
in-memory = []
# Habilita o adapter SQS (consumer Lambda ESM). NĂ£o puxa C deps â€” sĂ³ ativa o
# mĂ³dulo `sqs` e a feature `sqs` de `aws_lambda_events` (deserializaĂ§Ă£o de
# `SqsEvent`/`SqsBatchResponse`). `serverust-core` continua sem dep de SQS.
sqs = [
    "aws_lambda_events/sqs",
    "tokio/sync",
    "tokio/rt",
    "tokio/macros",
    "dep:tower",
    "dep:pin-project-lite",
    "dep:serverust-telemetry",
]
# Habilita o KafkaBroker (rdkafka + librdkafka C). Off por default â€” apps que
# sĂ³ consomem Kafka via Lambda trigger nĂ£o pagam o custo de librdkafka.
kafka = [
    "dep:rdkafka",
    "dep:aws-msk-iam-sasl-signer",
    "dep:aws-config",
    "dep:aws-types",
    "tokio/rt",
    "tokio/sync",
    "tokio/macros",
]
# Mantido por compatibilidade com v0.1.x. `kafka` Ă© o novo umbrella.
kafka-producer = ["kafka"]

[dependencies]
aws_lambda_events = { version = "1.2", default-features = false, features = ["kafka"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
thiserror = "1"
async-trait = "0.1"
# tokio/time sempre disponĂ­vel â€” necessĂ¡rio para sleep no backoff exponencial.
# Features de runtime (rt, sync, macros) ativas apenas com feature `kafka`.
tokio = { version = "1", features = ["time"] }
# GeraĂ§Ă£o de AsyncAPI 3.0 â€” opt-in via feature `asyncapi`. Leves, sem C deps.
schemars = { version = "0.8", optional = true }
serde_yaml = { version = "0.9", optional = true }
# Tower pipeline (feature `sqs`). MantĂ©m o build default leve.
tower = { version = "0.5", features = ["util"], optional = true }
pin-project-lite = { version = "0.2", optional = true }
# Telemetria reusada pelos Tower layers (feature `sqs`). Default features mantĂ©m
# o build leve (sem otel/dynamodb).
serverust-telemetry = { path = "../serverust-telemetry", version = "0.2.0", optional = true }

# Opt-in via feature `kafka` (e o alias `kafka-producer`).
# `ssl` Ă© necessĂ¡rio para SASL_SSL e habilita OAUTHBEARER nativamente em
# librdkafka. NĂƒO habilitar `sasl` â€” ela puxa libsasl2-dev (Cyrus) e quebra
# build local; OAUTHBEARER para MSK IAM nĂ£o depende de Cyrus SASL.
rdkafka = { version = "0.35", default-features = false, features = ["cmake-build", "tokio", "ssl"], optional = true }
aws-msk-iam-sasl-signer = { version = "1.0", optional = true }
aws-config = { version = "1", optional = true, default-features = false, features = ["rt-tokio"] }
aws-types = { version = "1", optional = true }

[dev-dependencies]
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serverust-macros = { path = "../serverust-macros" }
schemars = "0.8"
serde_yaml = "0.9"

[[test]]
name = "asyncapi_spec"
required-features = ["asyncapi"]

[[test]]
name = "sqs_consumer"
required-features = ["sqs"]

[[test]]
name = "sqs_delete"
required-features = ["sqs"]

[[test]]
name = "macros_sqs"
required-features = ["in-memory"]

[[test]]
name = "sqs_producer"
required-features = ["sqs"]

[[test]]
name = "sqs_fifo"
required-features = ["sqs"]

[[test]]
name = "macros_sqs_fifo"
required-features = ["in-memory", "sqs"]

[[test]]
name = "sqs_tower"
required-features = ["sqs"]

[[test]]
name = "sqs_idempotency"
required-features = ["sqs"]

[[test]]
name = "sqs_dlq"
required-features = ["sqs"]

[[test]]
name = "macros_sqs_dlq"
required-features = ["in-memory", "sqs"]

[[test]]
name = "sqs_heartbeat"
required-features = ["sqs"]

[[test]]
name = "sqs_standalone"
required-features = ["sqs"]
