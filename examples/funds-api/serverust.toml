# serverust.toml — configuração do projeto "funds-api"
# Perfis: default, dev, staging, prod
# Selecione com SERVERUST_PROFILE=prod ou ServerustConfig::load_for_profile("prod")
# Override por env: SERVERUST_SERVER__PORT=8080

[default.server]
host = "127.0.0.1"
port = 3000

[default.lambda]
memory_size = 128
timeout_seconds = 30

[default.telemetry]
log_level = "info"
format = "json"

[default.openapi]
title = "Funds API"
version = "1.0.0"
docs_path = "/docs"
redoc_path = "/redoc"

[dev.server]
port = 3001

[prod.server]
host = "0.0.0.0"
port = 8080
