# Configuração do git-cliff (https://git-cliff.org).
#
# Usado pelo release-plz para gerar CHANGELOG.md a partir de Conventional Commits.
# Também pode ser rodado standalone: `git cliff -o CHANGELOG.md`

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog 1.1.0](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.breaking %}[**BREAKING**] {% endif %}{{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})\
    {% endfor %}
{% endfor %}
"""
trim = true
footer = """
[unreleased]: https://github.com/JaimeJunr/serverust/compare/{previous}...HEAD
"""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^perf", group = "Performance" },
    { message = "^doc", group = "Documentation" },
    { message = "^refactor", group = "Refactor" },
    { message = "^test", group = "Tests" },
    { message = "^build", group = "Build" },
    { message = "^ci", group = "CI" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore", group = "Chore" },
    { message = "^revert", group = "Revert" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "^[a-z-]+-v[0-9]+\\.[0-9]+\\.[0-9]+$"
skip_tags = "v0.1.0|v0.2.0"  # tags legadas pré-per-crate
ignore_tags = ""
topo_order = false
sort_commits = "newest"
