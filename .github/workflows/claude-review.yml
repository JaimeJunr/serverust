name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    environment: Teste
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          mode: review
          direct_prompt: |
            Revise este PR contra a base. Foque em:
            - Correção lógica e edge cases.
            - Segurança (OWASP, injeção, secrets, SSRF).
            - Aderência ao CLAUDE.md do projeto (Surgical Changes, Simplicity First, invariantes serverust-core sem deps SQS, hello-world sem deps SQS, cold start <50ms preservado).
            - Cobertura de testes para mudanças novas.
            Postar comentários inline nos arquivos/linhas relevantes. Final: summary curto (3-5 bullets) com blockers, warnings e sugestões. Idioma: português.
