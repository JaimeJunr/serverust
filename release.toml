# Configuração para `cargo-release` (https://crates.io/crates/cargo-release).
#
# Uso típico:
#   cargo release patch --execute                # bump patch + tag + publish (todos os crates)
#   cargo release minor --execute                # bump minor (ex: feature nova)
#   cargo release major --execute                # bump major (ex: breaking change)
#   cargo release version <X.Y.Z> --execute      # bump específico
#
# Dry-run (default sem --execute):
#   cargo release patch                          # mostra o que faria
#
# Per-crate (estilo tokio/axum):
#   cargo release patch -p serverust-events --execute

# ─── Comportamento global ──────────────────────────────────────────────
sign-commit = false
sign-tag = true
push = true
publish = true
verify = true

# Política do tag por crate (estilo tokio/axum): `<crate-name>-vX.Y.Z`.
# Ex: `serverust-events-v0.3.1`, `serverust-cli-v0.4.0`.
# Quando rodar `cargo release --workspace`, um tag por crate alterado.
tag-name = "{{crate_name}}-v{{version}}"
tag-message = "Release {{crate_name}} v{{version}}"

# Mensagem do commit de release.
pre-release-commit-message = "chore(release): {{crate_name}} v{{version}}"

# Branch alvo. Sem allow-branch = só permite na branch atual; explicitar `main`
# evita release acidental em branch de feature.
allow-branch = ["main", "release/*"]

# Bloqueia release com working tree sujo (default true; explícito por seguran ̧ça).
dependent-version = "upgrade"

# ─── Hooks ────────────────────────────────────────────────────────────
# Antes do publish, valida changelog e métricas obrigatórias.
pre-release-hook = ["scripts/quality_changelog.sh"]

# ─── Substituições no CHANGELOG ──────────────────────────────────────
# Atualiza placeholders {{date}} e {{version}} se usados em CHANGELOG.md.
pre-release-replacements = [
    { file = "CHANGELOG.md", search = "## \\[Unreleased\\]", replace = "## [Unreleased]\n\n## [{{version}}] - {{date}}", exactly = 1 },
]
